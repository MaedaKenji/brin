<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .icon { fill: #1a1a2e; stroke: #1a1a2e; }
    .dot  { fill: #6c63ff; stroke: none; }
    @media (prefers-color-scheme: dark) {
      .icon { fill: #e0e0ff; stroke: #e0e0ff; }
      .dot  { fill: #a78bfa; stroke: none; }
    }
  </style>
  <!-- outer arc -->
  <path class="icon" fill="none" stroke-width="2.2" stroke-linecap="round"
        d="M6.5 25.5 A14 14 0 0 1 6.5 6.5"/>
  <path class="icon" fill="none" stroke-width="2.2" stroke-linecap="round"
        d="M25.5 6.5 A14 14 0 0 1 25.5 25.5"/>
  <!-- middle arc -->
  <path class="icon" fill="none" stroke-width="2" stroke-linecap="round"
        d="M10 22 A9 9 0 0 1 10 10"/>
  <path class="icon" fill="none" stroke-width="2" stroke-linecap="round"
        d="M22 10 A9 9 0 0 1 22 22"/>
  <!-- inner arc -->
  <path class="icon" fill="none" stroke-width="1.8" stroke-linecap="round"
        d="M13 19 A5 5 0 0 1 13 13"/>
  <path class="icon" fill="none" stroke-width="1.8" stroke-linecap="round"
        d="M19 13 A5 5 0 0 1 19 19"/>
  <!-- center dot -->
  <circle class="dot" cx="16" cy="16" r="2.5"/>
</svg>
